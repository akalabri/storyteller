services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    env_file: .env
    volumes:
      # Mount Google service account key (read-only)
      - ./key.json:/app/key.json:ro
      # Persist story sessions across container restarts
      - sessions:/app/sessions
    ports:
      - "8001:8000"
    depends_on:
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio1234
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  sessions:
