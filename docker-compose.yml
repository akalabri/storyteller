services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://storyteller:storyteller@postgres:5432/storyteller
      MINIO_ENDPOINT: minio:9000
    volumes:
      # Mount Google service account key (read-only)
      - ./key.json:/app/key.json:ro
      # Persist story sessions across container restarts
      - sessions:/app/sessions
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: storyteller-postgres
    environment:
      POSTGRES_USER: storyteller
      POSTGRES_PASSWORD: storyteller
      POSTGRES_DB: storyteller
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyteller"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: storyteller-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@storyteller.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio1234
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  sessions:
  pgdata:
