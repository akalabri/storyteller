services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    env_file: .env
    environment:
      FIREBASE_CREDENTIALS: /app/firebase-key.json
      FIRESTORE_DATABASE_ID: story
      MINIO_ENDPOINT: minio:9000
    volumes:
      # Mount Google service account key (read-only)
      - ./key.json:/app/key.json:ro
      - ./firebase-key.json:/app/firebase-key.json:ro
      # Persist story sessions in project folder (./sessions/<session_id>/)
      - ./sessions:/app/sessions
      # Mount backend source for auto-reload
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    command: ["uv", "run", "python", "-m", "backend.main"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    volumes:
      # Mount frontend source for live edits
      - ./frontend:/app
      # Keep container node_modules (don't overwrite with host)
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9002:9000"   # API (9000 in use on host → use 9002)
      - "9003:9001"   # Console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio1234
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"

volumes: {}
